name: Staging Deploy

on:
  push:
    branches:
      - staging

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret-for-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tmk:${{ secrets.API_IMAGE_TAG }}-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tmk:${{ secrets.API_IMAGE_TAG }}

      - name: Build and push batch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: batch
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tmk:${{ secrets.BATCH_IMAGE_TAG }}-${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/tmk:${{ secrets.BATCH_IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          source: "docker-compose.staging.yml,docker/postgres/init.sql"
          target: ${{ secrets.STAGING_DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VULTR_HOST }}
          username: ${{ secrets.VULTR_USER }}
          key: ${{ secrets.VULTR_SSH_KEY }}
          script: |
            set -eu

            DEPLOY_PATH="${{ secrets.STAGING_DEPLOY_PATH }}"
            mkdir -p "$DEPLOY_PATH/docker/postgres"
            cd "$DEPLOY_PATH"

            cat > .env.staging <<EOF
            POSTGRES_DB=${{ secrets.STAGING_POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.STAGING_POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.STAGING_POSTGRES_PASSWORD }}
            POSTGRES_PORT=${{ secrets.STAGING_POSTGRES_PORT }}
            REDIS_PORT=${{ secrets.STAGING_REDIS_PORT }}
            REDIS_PASSWORD=${{ secrets.STAGING_REDIS_PASSWORD }}
            DOCUMENT_STORAGE_DIR=${{ secrets.STAGING_DOCUMENT_STORAGE_DIR }}
            DOCKERHUB_NAMESPACE=${{ secrets.STAGING_DOCKERHUB_NAMESPACE }}
            JWT_SECRET=${{ secrets.STAGING_JWT_SECRET }}
            OPENAI_API_KEY=${{ secrets.STAGING_OPENAI_API_KEY }}
            OPENAI_EMBEDDING_MODEL=${{ secrets.STAGING_OPENAI_EMBEDDING_MODEL }}
            OPENAI_CHAT_MODEL=${{ secrets.STAGING_OPENAI_CHAT_MODEL }}
            API_IMAGE_TAG=${{ secrets.API_IMAGE_TAG }}
            BATCH_IMAGE_TAG=${{ secrets.BATCH_IMAGE_TAG }}
            EOF

            docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" -p "${{ secrets.DOCKERHUB_TOKEN }}"
            docker compose --env-file .env.staging -f docker-compose.staging.yml pull
            docker compose --env-file .env.staging -f docker-compose.staging.yml up -d
