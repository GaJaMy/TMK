<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMK Admin Manage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body class="admin-dashboard-body">
<main class="dashboard-shell">
    <aside class="sidebar">
        <nav class="sidebar-nav" aria-label="관리자 메뉴">
            <a class="nav-item" href="./dashboard.html">모니터링</a>
            <a class="nav-item" href="./questions-list.html">공용문제 관리</a>
            <a class="nav-item is-active" href="./admin-create.html">관리자 관리</a>
        </nav>
    </aside>

    <section class="dashboard-main">
        <header class="dashboard-header dashboard-header-compact">
            <div>
                <h1>관리자 관리</h1>
                <p>등록된 관리자 목록을 확인하고, 새 관리자 계정을 추가하거나 상태를 관리합니다.</p>
            </div>
        </header>

        <section class="table-panel">
            <div class="table-wrap">
                <table class="admin-table">
                    <thead>
                    <tr>
                        <th>아이디</th>
                        <th>상태</th>
                        <th>생성일</th>
                        <th>관리</th>
                    </tr>
                    </thead>
                    <tbody id="adminTableBody">
                    <tr class="append-row" id="appendAdminRow">
                        <td colspan="4"><span class="append-symbol">+</span></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="status-card" id="adminCreateStatus" aria-live="polite">
                관리자 목록/생성 API 연동 전입니다. 현재는 표와 다이얼로그 상호작용만 동작합니다.
            </div>
        </section>
    </section>
</main>

<div class="modal-backdrop" id="adminModalBackdrop" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle">
        <div class="modal-head">
            <div>
                <h2 id="adminModalTitle">관리자 추가</h2>
                <p>아이디와 비밀번호를 입력해 새 관리자 계정을 생성합니다.</p>
            </div>
            <button type="button" class="modal-close" id="closeAdminModal" aria-label="닫기">×</button>
        </div>

        <form class="admin-form" id="adminCreateForm">
            <label class="field">
                <span>아이디</span>
                <input id="newAdminId" name="newAdminId" type="text" placeholder="new admin id" required>
            </label>

            <label class="field">
                <span>비밀번호</span>
                <input id="newAdminPassword" name="newAdminPassword" type="password" placeholder="password" required>
            </label>

            <div class="modal-actions">
                <button type="button" class="secondary-button" id="cancelAdminModal">취소</button>
                <button type="submit" class="primary-button">등록</button>
            </div>
        </form>
    </div>
</div>

<script src="./assets/app.js"></script>
</body>
</html>
