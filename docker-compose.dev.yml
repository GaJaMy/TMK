services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: tmk-dev-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tmk}
      POSTGRES_USER: ${POSTGRES_USER:-tmk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tmk}
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tmk} -d ${POSTGRES_DB:-tmk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tmk-dev-network

  redis:
    image: redis:7-alpine
    container_name: tmk-dev-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-dev-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tmk-dev-network

networks:
  tmk-dev-network:
    driver: bridge

volumes:
  postgres-dev-data:
  redis-dev-data:
