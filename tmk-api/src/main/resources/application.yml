spring:
  application:
    name: tmk-api
  profiles:
    default: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tmk}
    username: ${DB_USERNAME:tmk}
    password: ${DB_PASSWORD:tmk}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

openai:
  api-key: ${OPENAI_API_KEY:}
  embedding:
    model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  chat:
    model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
    temperature: ${OPENAI_CHAT_TEMPERATURE:0.7}
    max-tokens: ${OPENAI_CHAT_MAX_TOKENS:4096}

app:
  document:
    storage-dir: ${DOCUMENT_STORAGE_DIR:./tmk-api/uploads}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:1800000}
  refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:604800000}
