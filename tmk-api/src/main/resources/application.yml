spring:
  application:
    name: tmk-api

  profiles:
    default: dev

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}

server:
  port: 8080

openai:
  api-key: ${OPENAI_API_KEY:}
  embedding:
    model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  chat:
    model: ${OPENAI_CHAT_MODEL:gpt-4o-mini}
    temperature: ${OPENAI_CHAT_TEMPERATURE:0.7}
    max-tokens: ${OPENAI_CHAT_MAX_TOKENS:4096}

app:
  document:
    storage-dir: ${DOCUMENT_STORAGE_DIR:./tmk-api/uploads}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiry: 1800000
  refresh-token-expiry: 604800000
