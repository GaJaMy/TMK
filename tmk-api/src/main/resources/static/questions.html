<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMK Questions</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-page="questions">
<div class="shell">
    <aside class="sidebar">
        <div class="brand">
            <strong>TMK Console</strong>
            <span>문항 목록 및 상세 탐색</span>
        </div>
        <nav class="nav">
            <a class="nav-link" href="/index.html">대시보드</a>
            <a class="nav-link" href="/login.html">계정</a>
            <a class="nav-link" href="/documents.html">문서 처리</a>
            <a class="nav-link active" href="/questions.html">문항 탐색</a>
            <a class="nav-link" href="/exams.html">시험 진행</a>
        </nav>
        <div class="status-card">
            <h3>사용자 상태</h3>
            <div class="meta-list">
                <div class="meta-row"><span>인증 상태</span><strong data-auth-summary>비로그인</strong></div>
                <div class="meta-row"><span>사용자</span><strong data-user-email>저장된 사용자 없음</strong></div>
            </div>
            <div class="button-row" style="margin-top: 14px;">
                <a href="/login.html" class="button-link primary">로그인</a>
                <button id="logoutBtn" type="button" class="secondary">로그아웃</button>
            </div>
        </div>
    </aside>

    <main class="content">
        <section class="topbar">
            <div>
                <h1 class="page-title">문항 탐색</h1>
                <p class="subtitle">문항 목록을 필터링하고, 개별 문항의 선택지, 정답, 해설까지 확인할 수 있습니다.</p>
            </div>
            <span class="pill">JWT 필요</span>
        </section>

        <section class="grid two">
            <article class="panel">
                <h2>문항 목록 조회</h2>
                <form id="questionListForm" class="stack">
                    <div class="split">
                        <label>타입
                            <input name="type" type="text" placeholder="MULTIPLE_CHOICE">
                        </label>
                        <label>난이도
                            <input name="difficulty" type="text" placeholder="EASY">
                        </label>
                    </div>
                    <label>주제
                        <select name="topic">
                            <option value="">전체</option>
                            <option value="SPRING">Spring</option>
                            <option value="JAVA">Java</option>
                            <option value="JPA">JPA</option>
                            <option value="DATABASE">Database</option>
                            <option value="NETWORK">Network</option>
                            <option value="SECURITY">Security</option>
                            <option value="ALGORITHM">Algorithm</option>
                            <option value="ETC">기타</option>
                        </select>
                    </label>
                    <label>범위
                        <select name="scope">
                            <option value="PUBLIC">TMK 제공 문제</option>
                            <option value="PRIVATE">내 문서 문제</option>
                        </select>
                    </label>
                    <div class="split">
                        <label>페이지
                            <input name="page" type="number" value="0">
                        </label>
                        <label>사이즈
                            <input name="size" type="number" value="10">
                        </label>
                    </div>
                    <button type="submit">문항 목록 불러오기</button>
                </form>
                <p id="questionMeta" class="helper" style="margin-top: 16px;">총 0건</p>
            </article>

            <article class="panel">
                <h2>문항 단건 조회</h2>
                <form id="questionDetailForm" class="stack">
                    <label>문항 ID
                        <input name="questionId" type="number" placeholder="예: 1" required>
                    </label>
                    <button type="submit" class="secondary">상세 조회</button>
                </form>
            </article>
        </section>

        <section class="grid two">
            <article class="panel">
                <h2>문항 목록</h2>
                <div id="questionList" class="list"></div>
            </article>

            <article class="panel">
                <h2>문항 상세</h2>
                <div id="questionDetail"></div>
            </article>
        </section>

        <section class="grid two">
            <article class="log-card">
                <h3>최근 요청 로그</h3>
                <div id="requestLogs" class="logs"></div>
            </article>

            <article class="panel">
                <div class="inline-actions" style="justify-content: space-between;">
                    <h2>응답 상세</h2>
                    <button id="clearResponseBtn" type="button" class="secondary">화면 로그 지우기</button>
                </div>
                <pre id="responseView" class="response-box">요청 결과가 여기에 표시됩니다.</pre>
            </article>
        </section>
    </main>
</div>
<script src="/ui.js"></script>
</body>
</html>
