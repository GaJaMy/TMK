<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TMK Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/styles.css">
</head>
<body class="user-home-body">
<main class="user-home-shell">
    <aside class="user-sidebar">
        <a class="user-sidebar-brand" href="./home.html">TMK</a>

        <nav class="user-sidebar-nav" aria-label="사용자 메뉴">
            <a class="user-nav-item" href="./documents.html">문서 등록</a>
            <a class="user-nav-item" href="./exams.html">시험 보기</a>
            <a class="user-nav-item" href="./history.html">시험 내역확인</a>
        </nav>
    </aside>

    <section class="user-home-main">
        <header class="user-home-header">
            <div class="user-home-copy">
                <span class="hero-kicker">USER HOME</span>
                <h1>학습 흐름을 시작합니다.</h1>
                <p>문서를 등록하고, 시험을 보고, 시험 내역을 확인하는 사용자 메인 화면입니다.</p>
            </div>

            <div class="user-account-box">
                <strong class="user-account-name" data-user-username>user</strong>
                <button type="button" class="user-logout-button" data-user-logout>로그아웃</button>
            </div>
        </header>

        <section class="user-home-placeholder">
            <article class="user-home-card">
                <span class="feature-index">NAVIGATION</span>
                <h2>문서 등록</h2>
                <p>PDF와 <code>.md</code> 문서를 등록해 개인 문제 생성을 시작하는 진입 영역입니다.</p>
            </article>

            <article class="user-home-card">
                <span class="feature-index">EXAM</span>
                <h2>시험 보기</h2>
                <p>공용 문제 또는 개인 문제 기반 시험을 생성하고 시작하는 영역입니다.</p>
            </article>

            <article class="user-home-card">
                <span class="feature-index">HISTORY</span>
                <h2>시험 내역확인</h2>
                <p>이전 시험 결과, 정답, 해설을 다시 확인하는 영역입니다.</p>
            </article>
        </section>
    </section>
</main>
<script src="./assets/app.js"></script>
</body>
</html>
